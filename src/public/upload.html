<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upload tool</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <h1>Upload a tool</h1>
          <p>Share your MCP tool with the Jumith Hub.</p>
        </div>
        <div class="actions">
          <a class="button" href="/">All tools</a>
        </div>
      </header>

      <section class="card">
        <form id="uploadForm" class="form">
          <div>
            <label for="file">index.js file</label>
            <input id="file" name="file" type="file" accept=".js" required />
          </div>
          <div>
            <label for="inputSchema">Input schema (JSON)</label>
            <textarea
              id="inputSchema"
              name="input_schema"
              placeholder='{"type":"object","properties":{"a":{"type":"number"},"b":{"type":"number"}},"required":["a","b"]}'
              required
            ></textarea>
            <div class="helper-text">Must be a JSON Schema object.</div>
          </div>
          <div>
            <label for="outputSchema">Output schema (JSON)</label>
            <textarea
              id="outputSchema"
              name="output_schema"
              placeholder='{"type":"object","properties":{"sum":{"type":"number"}},"required":["sum"]}'
              required
            ></textarea>
            <div class="helper-text">Must be a JSON Schema object.</div>
          </div>
          <div class="toggle-row">
            <label class="toggle">
              <input id="usesPayment" name="uses_payment" type="checkbox" />
              Uses payment
            </label>
            <label class="toggle">
              <input id="requiresApproval" name="requires_approval" type="checkbox" />
              Requires approval
            </label>
          </div>
          <div>
            <label for="requiredSecrets">Required secret env vars</label>
            <textarea
              id="requiredSecrets"
              name="required_secrets"
              placeholder="ONE_SECRET_PER_LINE"
            ></textarea>
            <div class="helper-text">Add one secret key per line.</div>
          </div>
          <div class="actions">
            <button class="button primary" type="submit">Upload tool</button>
          </div>
        </form>
        <div id="uploadStatus" class="status" style="display: none;"></div>
      </section>
    </main>

    <script src="/js/upload.js"></script>
  </body>
</html>
